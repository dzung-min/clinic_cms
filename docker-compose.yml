services:
  db:
    image: mysql:latest
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinic
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # Use mysqladmin to ping the server; -h 127.0.0.1 ensures it checks the actual server
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s       # Time between checks
      timeout: 5s        # Time to wait for a response
      retries: 5         # Number of failures before marking 'unhealthy'
      start_period: 30s  # Grace period for the container to initialize
  
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "8081:80"

volumes:
  db_data:
